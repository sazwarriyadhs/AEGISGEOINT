# D:\AegisGeoInt\docker-compose.yml
# VERSION SUDAH DIHAPUS (obsolete)

services:
  # ============================================
  # POSTGRES + POSTGIS DATABASE
  # ============================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aegis-postgres-papua
    environment:
      POSTGRES_DB: aegis_db
      POSTGRES_USER: aegis_user
      POSTGRES_PASSWORD: aegis_password
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/queries:/docker-entrypoint-initdb.d
      - ./database/backups:/backups
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis_user -d aegis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: aegis-redis-papua
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-backend-papua
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_USER: aegis_user
      DB_PASSWORD: aegis_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aegis_db
      DATABASE_URL: postgresql://aegis_user:aegis_password@postgres:5432/aegis_db
      REDIS_URL: redis://redis:6379
      AI_ENGINE_URL: http://ai-engine:8000
      AI_WS_URL: ws://ai-engine:5002
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - aegis-network
    restart: unless-stopped
    command: npm run dev

  # ============================================
  # FRONTEND - REACT + VITE (PRODUCTION NGINX)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_WS_URL=ws://localhost:5000
        - VITE_AI_URL=http://localhost:5001
    container_name: aegis-frontend-papua
    ports:
      - "3000:80"  # Nginx di dalam container pake port 80
    depends_on:
      - backend
    networks:
      - aegis-network
    restart: unless-stopped
    # TIDAK ADA volumes
    # TIDAK ADA command
    # TIDAK ADA environment (sudah di build)

  # ============================================
  # AI ENGINE - PYTHON + PYTORCH
  # ============================================
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
      args:
        - CUDA_ENABLED=${CUDA_ENABLED:-false}
    container_name: aegis-ai-engine-papua
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aegis_db
      DB_USER: aegis_user
      DB_PASSWORD: aegis_password
      API_HOST: 0.0.0.0
      API_PORT: 8000
      WS_PORT: 5002
      AI_HOST: 0.0.0.0
      AI_PORT: 5001
      BACKEND_URL: http://backend:5000
      MODEL_PATH: /app/models/pretrained
      LOG_LEVEL: INFO
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-}
    ports:
      - "8000:8000"
      - "5001:5001"
      - "5002:5002"
    depends_on:
      - backend
      - postgres
      - redis
    volumes:
      - ./ai-engine:/app
      - ./ai-engine/models:/app/models
      - ./ai-engine/data:/app/data
      - ./ai-engine/logs:/app/logs
      - ./ai-engine/uploads:/app/uploads
    networks:
      - aegis-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python main.py

  # ============================================
  # GEOSERVER - MAP SERVICES
  # ============================================
  geoserver:
    image: kartoza/geoserver:latest
    container_name: aegis-geoserver-papua
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      INSTALL_EXTENSIONS: true
    ports:
      - "8089:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./geoserver/data:/opt/geoserver/data_dir
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/geoserver/web/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # NGINX - REVERSE PROXY (OPTIONAL)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: aegis-nginx-papua
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
      - ai-engine
      - geoserver
    networks:
      - aegis-network
    restart: unless-stopped
    profiles:
      - production  # Hanya jalan kalo pake profile

  # ============================================
  # PGADMIN - DATABASE MANAGEMENT
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aegis-pgadmin-papua
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aegis.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - aegis-network
    restart: unless-stopped

  # ============================================
  # PROMETHEUS - MONITORING
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: aegis-prometheus-papua
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - aegis-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # ============================================
  # GRAFANA - VISUALIZATION
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: aegis-grafana-papua
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - aegis-network
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  geoserver_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  aegis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16